name: Apply loaded chunk null guard

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/apply-null-guard.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch unsafe translocator chunk read
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("RumorNetwork/Catalog/VerifiedStructureDiscoveryService.cs")
          text = path.read_text(encoding="utf-8-sig")

          old = '''                bool containsTranslocator = false;

                foreach (int blockId in translocatorBlockIds)
                {
                    if (chunk.Data.ContainsBlock(blockId))
                    {
                        containsTranslocator = true;
                        break;
                    }
                }

                if (!containsTranslocator)
                {
                    continue;
                }

                chunk.Unpack_ReadOnly();
'''

          new = '''                if (
                    chunk.Empty ||
                    chunk.Disposed
                )
                {
                    continue;
                }

                bool unpacked;

                try
                {
                    unpacked = chunk.Unpack_ReadOnly();
                }
                catch (Exception exception)
                {
                    logger.Warning(
                        "Rumor Network ignorou chunk sem dados " +
                        $"utilizáveis em {chunkCoord.X},{chunkY}," +
                        $"{chunkCoord.Y}: " +
                        exception.GetBaseException().Message
                    );

                    continue;
                }

                IChunkBlocks? data = chunk.Data;

                if (!unpacked || data == null)
                {
                    continue;
                }

                bool containsTranslocator = false;

                foreach (int blockId in translocatorBlockIds)
                {
                    if (data.ContainsBlock(blockId))
                    {
                        containsTranslocator = true;
                        break;
                    }
                }

                if (!containsTranslocator)
                {
                    continue;
                }
'''

          if text.count(old) != 1:
              raise SystemExit(
                  f"Expected exactly one unsafe block, found {text.count(old)}"
              )

          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RumorNetwork/Catalog/VerifiedStructureDiscoveryService.cs
          git commit -m "Guard unloaded chunk data during discovery"
          git push
